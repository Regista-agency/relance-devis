version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: regista-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: regista
      POSTGRES_PASSWORD: regista123
      POSTGRES_DB: regista_agency
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - regista-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regista -d regista_agency"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: regista-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://regista:regista123@postgres:5432/regista_agency
      - NEXTAUTH_SECRET=regista-secret-key-change-in-production-min-32-chars
      - NEXTAUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_NAME=Regista Agency
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - regista-network
    command: sh -c "npx prisma migrate deploy && npm run dev"

  # pgAdmin (Optional - Web UI for PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: regista-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@regista-agency.fr
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    depends_on:
      - postgres
    networks:
      - regista-network

volumes:
  postgres_data:
    driver: local

networks:
  regista-network:
    driver: bridge